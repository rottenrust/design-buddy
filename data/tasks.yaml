skills:
  - id: problem_framing
    order: 10
    title: Формулирование пользовательской проблемы
    description: Понять, для кого проект, в каком контексте возникает проблема и почему её стоит решать.
    diagnostic_questions:
      - Как ты обычно отличаешь пользовательскую проблему от бизнес-задачи?
      - Можешь привести пример проблемы пользователя из своего кейса?

  - id: research_planning
    order: 20
    title: Планирование исследования
    description: Сформулировать цель исследования, вопросы, участников и формат проверки гипотез.
    diagnostic_questions:
      - Что ты фиксируешь перед началом исследования?
      - Как понимаешь, каких участников нужно позвать?

  - id: user_interviews
    order: 30
    title: Пользовательские интервью
    description: Готовить вопросы и проводить интервью так, чтобы получать опыт пользователя, а не мнения о решении.
    diagnostic_questions:
      - Какие вопросы помогают не подсказывать ответ?
      - Как ты возвращаешь человека от оценок к конкретному опыту?

  - id: research_synthesis
    order: 40
    title: Синтез наблюдений и инсайты
    description: Группировать наблюдения, находить паттерны и формулировать проверяемые инсайты.
    diagnostic_questions:
      - Чем наблюдение отличается от инсайта?
      - Как ты решаешь, какие выводы действительно важны?

  - id: user_needs
    order: 50
    title: Потребности и контекст пользователя
    description: Описывать потребности, мотивацию, ограничения и ситуацию использования на основе данных.
    diagnostic_questions:
      - Как ты формулируешь потребность без готового интерфейсного решения?
      - Какие детали контекста влияют на дизайн?

  - id: user_flows
    order: 60
    title: Task analysis и пользовательские сценарии
    description: Разбирать задачу пользователя на шаги, развилки, ошибки и точки принятия решений.
    diagnostic_questions:
      - Как ты описываешь путь пользователя до экранов?
      - Где в сценарии обычно возникают сбои или сомнения?

  - id: information_architecture
    order: 70
    title: Структура контента и навигации
    description: Организовывать разделы, названия и навигацию так, чтобы пользователь быстро находил нужное.
    diagnostic_questions:
      - Как ты проверяешь, что структура понятна пользователю?
      - Что делает название раздела хорошим?

  - id: interaction_design
    order: 80
    title: Проектирование взаимодействия и состояний
    description: Продумывать действия, обратную связь, ошибки, пустые состояния и переходы между состояниями.
    diagnostic_questions:
      - Какие состояния ты проверяешь перед передачей макета?
      - Как показываешь пользователю результат действия?

  - id: prototyping
    order: 90
    title: Проверяемые прототипы
    description: Делать прототипы, которые проверяют конкретную гипотезу, а не просто демонстрируют экраны.
    diagnostic_questions:
      - Как решаешь, насколько детальным должен быть прототип?
      - Что именно пользователь должен сделать в прототипе?

  - id: usability_testing
    order: 100
    title: Юзабилити-тестирование
    description: Готовить задания, наблюдать за поведением и превращать проблемы теста в решения.
    diagnostic_questions:
      - Как отличаешь ошибку интерфейса от случайной ошибки участника?
      - Что фиксируешь во время теста?

  - id: accessibility
    order: 110
    title: Базовая доступность и инклюзивность
    description: Учитывать контраст, читаемость, фокус, альтернативные состояния и разные ограничения пользователей.
    diagnostic_questions:
      - Какие базовые проверки доступности ты делаешь в макете?
      - Как понимаешь, что интерфейс не зависит только от цвета?

  - id: design_rationale
    order: 120
    title: Аргументация решений и итерация
    description: Объяснять дизайн-решения через данные, цели, ограничения и обратную связь.
    diagnostic_questions:
      - Как ты объясняешь, почему выбрала конкретное решение?
      - Что делаешь с противоречивой обратной связью?

tasks:
  - id: problem_framing_task
    skill_id: problem_framing
    order: 10
    title: Сформулировать пользовательскую проблему
    why_it_matters: Без ясной проблемы дизайн легко превращается в набор экранов без причины.
    context: Возьми один учебный, портфолио или вымышленный продукт, который хочешь улучшить.
    brief: Опиши пользователя, ситуацию, проблему, последствия и желаемый исход без упоминания готового решения.
    deliverables:
      - Один абзац формулировки проблемы.
      - Короткий список фактов или предположений, на которых она основана.
    learning_steps:
      - Выбрать конкретного пользователя и контекст.
      - Отделить симптом от причины.
      - Сформулировать проблему без интерфейсного решения.
      - Проверить, понятно ли, почему проблема важна.
    explanation_topics:
      - Разница между бизнес-задачей, пользовательской проблемой и решением.
      - Хорошая структура problem statement.
    rubric:
      - id: user
        title: Понятно, о каком пользователе идёт речь.
      - id: context
        title: Описан контекст использования.
      - id: problem
        title: Проблема сформулирована без готового решения.
      - id: impact
        title: Видно, почему проблема важна.
    common_mistakes:
      - Начинать с решения вместо проблемы.
      - Описывать слишком широкую аудиторию.
      - Формулировать проблему как личное мнение дизайнера.
    done_definition: Есть проверяемая формулировка проблемы с пользователем, контекстом, болью и последствиями.

  - id: research_planning_task
    skill_id: research_planning
    order: 20
    title: Составить план исследования
    why_it_matters: План исследования помогает не собирать случайные мнения и связать вопросы с решениями.
    context: Используй проблему из своего кейса или выбери продукт, где нужно понять поведение пользователей.
    brief: Подготовь мини-план исследования с целью, гипотезами, участниками, методом и вопросами.
    deliverables:
      - Цель исследования.
      - 3-5 исследовательских вопросов.
      - Описание участников и метода.
    learning_steps:
      - Сформулировать, какое решение должно поддержать исследование.
      - Записать гипотезы и неизвестные.
      - Выбрать подходящий метод.
      - Определить участников и критерии отбора.
    explanation_topics:
      - Разница между гипотезой и вопросом исследования.
      - Когда подходят интервью, опросы и тесты.
    rubric:
      - id: goal
        title: Цель исследования связана с дизайн-решением.
      - id: questions
        title: Вопросы открытые и проверяют неизвестные.
      - id: participants
        title: Участники описаны конкретно.
      - id: method
        title: Метод подходит к цели.
    common_mistakes:
      - Задавать вопросы про понравится ли решение.
      - Выбирать метод до цели.
      - Описывать участников слишком общо.
    done_definition: Есть короткий план исследования, по которому можно начать рекрутинг или подготовку интервью.

  - id: user_interviews_task
    skill_id: user_interviews
    order: 30
    title: Подготовить сценарий интервью
    why_it_matters: Хороший сценарий помогает услышать реальный опыт пользователя, а не получить социально желательные ответы.
    context: Возьми тему исследования и представь 20-30 минутное интервью с одним пользователем.
    brief: Напиши вступление, блоки вопросов и 8-10 открытых вопросов без подсказки решения.
    deliverables:
      - Короткое вступление для участника.
      - Список вопросов по блокам.
      - 2-3 уточняющих follow-up вопроса.
    learning_steps:
      - Определить цель интервью.
      - Сгруппировать вопросы от общего к конкретному.
      - Убрать наводящие формулировки.
      - Добавить вопросы про недавние примеры поведения.
    explanation_topics:
      - Наводящие и ненаводящие вопросы.
      - Как спрашивать про прошлый опыт.
    rubric:
      - id: intro
        title: Вступление снижает напряжение и объясняет формат.
      - id: open_questions
        title: Вопросы открытые и не подсказывают ответ.
      - id: experience
        title: Есть вопросы про конкретный прошлый опыт.
      - id: structure
        title: Сценарий идёт от простого к глубокому.
    common_mistakes:
      - Спрашивать, нравится ли интерфейс.
      - Смешивать несколько вопросов в одном.
      - Сразу показывать решение.
    done_definition: Есть сценарий интервью, который можно использовать без существенной правки.

  - id: research_synthesis_task
    skill_id: research_synthesis
    order: 40
    title: Синтезировать наблюдения в инсайты
    why_it_matters: Синтез превращает заметки исследования в понятные выводы для дизайн-решений.
    context: Используй 6-10 наблюдений из интервью, теста или вымышленного набора данных.
    brief: Сгруппируй наблюдения, выдели паттерны и сформулируй 2-3 инсайта.
    deliverables:
      - Список сгруппированных наблюдений.
      - 2-3 инсайта.
      - Короткое объяснение, какие решения они поддерживают.
    learning_steps:
      - Выписать наблюдения без интерпретации.
      - Найти повторяющиеся темы.
      - Сформулировать инсайт как объяснение поведения.
      - Связать инсайт с возможным дизайн-направлением.
    explanation_topics:
      - Наблюдение, паттерн и инсайт.
      - Как не перепрыгнуть к решению слишком рано.
    rubric:
      - id: observations
        title: Наблюдения отделены от выводов.
      - id: patterns
        title: Паттерны основаны на нескольких наблюдениях.
      - id: insights
        title: Инсайты объясняют причину поведения.
      - id: implications
        title: Есть связь с дизайн-решениями.
    common_mistakes:
      - Называть инсайтом одно случайное мнение.
      - Писать решение вместо вывода.
      - Игнорировать противоречивые данные.
    done_definition: Есть набор инсайтов с основанием в наблюдениях и понятными последствиями для дизайна.

  - id: user_needs_task
    skill_id: user_needs
    order: 50
    title: Описать потребности пользователя
    why_it_matters: Потребности помогают проектировать не под абстрактного пользователя, а под ситуацию и мотив.
    context: Используй данные исследования или problem statement из выбранного кейса.
    brief: Сформулируй 3-5 потребностей пользователя вместе с контекстом, мотивацией и ограничениями.
    deliverables:
      - Список потребностей в формате пользователю нужно..., чтобы...
      - Контекст и ограничения для каждой потребности.
      - Приоритет потребностей.
    learning_steps:
      - Выделить ситуации использования.
      - Сформулировать потребности без интерфейсных решений.
      - Добавить мотивацию и ограничения.
      - Расставить приоритеты.
    explanation_topics:
      - Потребность против фичи.
      - Jobs-to-be-done в простом виде.
    rubric:
      - id: need
        title: Потребности не подменены функциями.
      - id: context
        title: Указан контекст возникновения потребности.
      - id: motivation
        title: Видно, зачем это важно пользователю.
      - id: priority
        title: Приоритеты объяснены.
    common_mistakes:
      - Писать пользователь хочет кнопку.
      - Не указывать ситуацию.
      - Делать все потребности одинаково важными.
    done_definition: Есть приоритизированный список потребностей, который может направлять сценарии и интерфейс.

  - id: user_flows_task
    skill_id: user_flows
    order: 60
    title: Разобрать пользовательский сценарий
    why_it_matters: Сценарий показывает, какие шаги, решения и ошибки нужно поддержать интерфейсом.
    context: Выбери одну важную задачу пользователя в продукте или кейсе.
    brief: Опиши основной flow, альтернативные ветки, ошибки и точки неопределённости.
    deliverables:
      - Основной сценарий по шагам.
      - Альтернативные ветки и ошибки.
      - Список возможностей улучшения.
    learning_steps:
      - Назвать цель пользователя.
      - Разложить путь на шаги до экранов.
      - Найти решения, ожидания и возможные сбои.
      - Отметить, где интерфейс должен помогать.
    explanation_topics:
      - Task analysis и user flow.
      - Разница между happy path и edge cases.
    rubric:
      - id: goal
        title: Цель пользователя ясна.
      - id: sequence
        title: Шаги идут в логичном порядке.
      - id: branches
        title: Учтены альтернативные ветки и ошибки.
      - id: design_opportunities
        title: Выводы связаны с улучшениями интерфейса.
    common_mistakes:
      - Начинать со списка экранов.
      - Описывать только идеальный путь.
      - Пропускать решения пользователя.
    done_definition: Есть сценарий, по которому можно проектировать экраны и состояния.

  - id: information_architecture_task
    skill_id: information_architecture
    order: 70
    title: Спроектировать структуру разделов
    why_it_matters: Понятная структура снижает нагрузку и помогает пользователю быстрее найти нужное.
    context: Возьми сайт, приложение или раздел портфолио с несколькими типами информации.
    brief: Составь структуру разделов, названия пунктов и краткую логику навигации.
    deliverables:
      - Список разделов и подразделов.
      - Названия навигационных пунктов.
      - Объяснение принципа группировки.
    learning_steps:
      - Собрать основные типы контента.
      - Сгруппировать их по задачам пользователя.
      - Назвать разделы простым языком.
      - Проверить, где пользователь будет искать ключевые элементы.
    explanation_topics:
      - Ментальные модели и группировка контента.
      - Хорошие навигационные названия.
    rubric:
      - id: grouping
        title: Контент сгруппирован по понятному принципу.
      - id: labels
        title: Названия ясные и пользовательские.
      - id: navigation
        title: Видно, как пользователь найдёт ключевые действия.
      - id: completeness
        title: Важный контент не потерян.
    common_mistakes:
      - Называть разделы внутренними терминами компании.
      - Смешивать разные задачи в одном пункте.
      - Делать слишком глубокую структуру.
    done_definition: Есть структура, которую можно проверить на понятность или использовать в прототипе.

  - id: interaction_design_task
    skill_id: interaction_design
    order: 80
    title: Описать взаимодействия и состояния
    why_it_matters: Состояния и обратная связь делают интерфейс предсказуемым, особенно в ошибках и ожидании.
    context: Выбери один ключевой экран или форму из проекта.
    brief: Опиши действия пользователя, системную обратную связь, ошибки, пустое состояние и состояние загрузки.
    deliverables:
      - Список ключевых действий.
      - Описание состояний интерфейса.
      - Текст или логика ошибок и подтверждений.
    learning_steps:
      - Выбрать основной пользовательский action.
      - Описать нормальный путь.
      - Добавить loading, empty, error и success states.
      - Проверить, понимает ли пользователь, что произошло.
    explanation_topics:
      - Feedback loop в интерфейсе.
      - Empty, loading, error и success states.
    rubric:
      - id: actions
        title: Ключевые действия пользователя названы.
      - id: feedback
        title: Для действий есть понятная обратная связь.
      - id: states
        title: Учтены основные состояния.
      - id: recovery
        title: Ошибки помогают восстановиться.
    common_mistakes:
      - Проектировать только идеальный заполненный экран.
      - Показывать ошибку без следующего шага.
      - Не объяснять результат действия.
    done_definition: Есть описание взаимодействий и состояний, достаточное для макета или прототипа.

  - id: prototyping_task
    skill_id: prototyping
    order: 90
    title: Спланировать проверяемый прототип
    why_it_matters: Прототип ценен, когда проверяет конкретный вопрос, а не просто выглядит законченным.
    context: Выбери гипотезу по сценарию, навигации или взаимодействию.
    brief: Определи цель прототипа, нужные экраны, уровень детализации и задание для пользователя.
    deliverables:
      - Гипотеза или вопрос проверки.
      - Список экранов и переходов.
      - Задание для пользователя.
    learning_steps:
      - Сформулировать, что нужно проверить.
      - Выбрать минимальный набор экранов.
      - Определить интерактивные переходы.
      - Написать пользовательское задание.
    explanation_topics:
      - Low-fi, mid-fi и high-fi прототипы.
      - Как не делать лишнюю детализацию.
    rubric:
      - id: hypothesis
        title: Прототип проверяет конкретный вопрос.
      - id: scope
        title: Объём прототипа минимально достаточный.
      - id: flow
        title: Переходы поддерживают задачу пользователя.
      - id: test_task
        title: Пользовательское задание проверяемое и понятное.
    common_mistakes:
      - Делать все экраны продукта.
      - Смешивать несколько гипотез без приоритета.
      - Проверять красоту вместо поведения.
    done_definition: Есть план прототипа, по которому понятно, что собрать и как проверить.

  - id: usability_testing_task
    skill_id: usability_testing
    order: 100
    title: Подготовить юзабилити-тест
    why_it_matters: Тест помогает увидеть реальные затруднения пользователя до того, как решение станет дорогим.
    context: Используй прототип или существующий интерфейс с одной важной задачей.
    brief: Подготовь цель теста, сценарий задания, метрики наблюдения и шаблон фиксации проблем.
    deliverables:
      - Цель теста.
      - Задание для участника.
      - Чеклист наблюдений и формат выводов.
    learning_steps:
      - Выбрать задачу для проверки.
      - Написать нейтральное задание.
      - Определить, что считать проблемой.
      - Подготовить формат записи наблюдений.
    explanation_topics:
      - Наблюдение поведения против оценки мнения.
      - Severity проблем в простом виде.
    rubric:
      - id: goal
        title: Цель теста конкретна.
      - id: task
        title: Задание не подсказывает путь.
      - id: observations
        title: Понятно, какие наблюдения фиксировать.
      - id: outcomes
        title: Есть способ превратить проблемы в решения.
    common_mistakes:
      - Объяснять участнику, куда нажимать.
      - Записывать только понравилось или нет.
      - Исправлять интерфейс во время теста.
    done_definition: Есть план теста, который можно провести с одним участником.

  - id: accessibility_task
    skill_id: accessibility
    order: 110
    title: Проверить базовую доступность экрана
    why_it_matters: Доступность делает интерфейс понятнее для большего числа людей и часто улучшает базовое качество UX.
    context: Выбери один экран с текстом, действиями и состояниями.
    brief: Проверь экран по базовым критериям доступности и составь список исправлений.
    deliverables:
      - Чеклист проверок.
      - Список найденных проблем.
      - Предложенные исправления.
    learning_steps:
      - Проверить контраст и размер текста.
      - Найти элементы, зависящие только от цвета.
      - Проверить фокус и порядок действий.
      - Описать альтернативные состояния и подписи.
    explanation_topics:
      - Контраст, фокус и смысловые подписи.
      - Почему нельзя передавать смысл только цветом.
    rubric:
      - id: contrast
        title: Проверены контраст и читаемость.
      - id: color
        title: Смысл не зависит только от цвета.
      - id: focus
        title: Учтены фокус и порядок действий.
      - id: fixes
        title: Исправления конкретны и применимы.
    common_mistakes:
      - Проверять доступность только в конце.
      - Считать, что красивый контраст всегда достаточен.
      - Не описывать состояния ошибок.
    done_definition: Есть понятный список accessibility-проблем и конкретных правок экрана.

  - id: design_rationale_task
    skill_id: design_rationale
    order: 120
    title: Аргументировать дизайн-решение
    why_it_matters: Аргументация показывает зрелость дизайнера и помогает принимать обратную связь без защиты вкуса.
    context: Возьми одно спорное или важное решение из кейса.
    brief: Объясни решение через цель, данные, ограничения, альтернативы и следующий шаг проверки.
    deliverables:
      - Короткое rationale для решения.
      - Альтернативы и причина выбора.
      - План итерации по обратной связи.
    learning_steps:
      - Назвать цель решения.
      - Связать решение с данными или наблюдениями.
      - Описать ограничения и альтернативы.
      - Сформулировать, как проверить или улучшить решение.
    explanation_topics:
      - Аргументация через evidence, а не вкус.
      - Как работать с обратной связью.
    rubric:
      - id: goal
        title: Решение связано с целью пользователя или продукта.
      - id: evidence
        title: Есть основание в данных, наблюдениях или ограничениях.
      - id: alternatives
        title: Рассмотрены альтернативы.
      - id: iteration
        title: Есть следующий шаг проверки или улучшения.
    common_mistakes:
      - Объяснять решение только красотой.
      - Не признавать ограничения.
      - Воспринимать обратную связь как спор о вкусе.
    done_definition: Есть убедимое rationale, которое можно вставить в кейс или использовать на ревью.
